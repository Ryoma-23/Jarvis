<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>J.A.R.V.I.S</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

    <div class="container">

        <h1>J.A.R.V.I.S</h1>

        <div id="chat-area"></div>

        <div class="input-area">

            <input
                type="text"
                id="message-input"
                placeholder="メッセージを入力..."
            >

            <div class="voice-controls">
                <button id="voice-connect-button">音声接続ON</button>
                <button id="voice-disconnect-button" disabled>音声切断</button>
                <button id="voice-reconnect-button" disabled>再接続</button>

                <div id="voice-status" class="voice-status">
                    音声状態: 未接続
                </div>
            </div>

            <button id="send-button">
                送信
            </button>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
